llm:
  api_key_env: DASHSCOPE_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus
  max_tokens: 4096
  temperature: 0.7

image:
  provider: dashscope
  api_key_env: DASHSCOPE_API_KEY
  model: wanx-v1
  size: "1024*1024"
  n: 1
  style: "<auto>"

tts:
  voice: zh-CN-YunxiNeural
  rate: "+0%"
  volume: "+0%"

video:
  fps: 24
  resolution:
    width: 1920
    height: 1080
  transition_duration: 1.0
  ken_burns_zoom_start: 1.0
  ken_burns_zoom_end: 1.15

pipeline:
  concurrent_images: 3
  max_retries: 3
  retry_delay: 2.0
  max_scenes: 20
