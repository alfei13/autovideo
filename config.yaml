llm:
  model: gpt-4o
  api_base: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  max_tokens: 4096

image:
  provider: openai
  model: dall-e-3
  size: 1792x1024
  quality: hd

tts:
  provider: edge-tts
  voice: zh-CN-YunxiNeural
  rate: "+0%"
  volume: "+0%"

video:
  fps: 24
  resolution:
    width: 1920
    height: 1080
  transition_duration: 1.0
  image_duration: 5.0
  output_format: mp4
  codec: libx264
  audio_codec: aac

pipeline:
  max_scenes: 50
  scene_overlap: 0.5
  concurrent_images: 3
  retry_attempts: 3
